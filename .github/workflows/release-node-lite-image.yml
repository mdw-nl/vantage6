name: Release Node Lite Image

on:
  push:
    tags:
      - "release-mdw/node-lite/v*"

permissions: {}

jobs:
  release-node-image:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}/infrastructure/node-lite

    steps:
      - name: Checkout repository
        # TODO: pin this
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#release-mdw/node-lite/v}"
          if [ -z "$VERSION" ]; then
            echo "Version is empty"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "Version contains unsupported characters: $VERSION"
            exit 1
          fi

          IMAGE="${IMAGE_REPOSITORY}:${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        # TODO: pin this
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # TODO: pin this
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        id: push
        # TODO: pin this
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/node.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Show published image
        shell: bash
        run: |
          echo "Built image: ${{ steps.meta.outputs.image }}"
